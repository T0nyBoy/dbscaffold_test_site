  </g>

  <!-- wordmark -->
  <text x="132" y="62" class="wordmark" font-size="40" fill="#FFFFFF">DAVIS &amp; BARRETT</text>
  <text x="132" y="90" class="tag" font-size="14" fill="#C8102E">SCAFFOLDING CONTRACTORS LTD</text>
</svg>
