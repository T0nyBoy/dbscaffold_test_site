<svg width="720" height="120" viewBox="0 0 720 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Davis & Barrett Scaffolding Contractors Ltd">
  <defs>
    <style>
      .wordmark { font-family: 'Oswald','Arial Narrow',sans-serif; font-weight: 700; }
      .tag { font-family: 'Roboto Mono','Courier New',monospace; font-weight: 500; letter-spacing: 3px; }
    </style>
  </defs>

  <!-- mark: skewed panel referencing scaffold bracing -->
  <g>
